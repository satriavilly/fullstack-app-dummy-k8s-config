apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: satriav/myapp-backend:v1.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3001
          name: http

        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_NAME

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_PASSWORD

        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "768Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: myapp

spec:
  selector:
    app: backend

  ports:
  - port: 3001
    targetPort: 3001
    name: http

  type: ClusterIP
