apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: myapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: satriav/myapp-frontend:v1.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000
          name: http

        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NEXT_PUBLIC_API_URL

        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: myapp

spec:
  selector:
    app: frontend

  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30000
    name: http

  type: NodePort
